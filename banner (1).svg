<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="55%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C6A55A"/>
      <stop offset="50%" stop-color="#E8D9B5"/>
      <stop offset="100%" stop-color="#C6A55A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#C6A55A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C6A55A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>
  <circle cx="980" cy="70" r="220" fill="url(#glow)"/>
  <circle cx="180" cy="230" r="180" fill="url(#glow)"/>

  <!-- thin gold border -->
  <rect x="6" y="6" width="1188" height="268" fill="none" stroke="#C6A55A" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- gem / facet icon -->
  <g transform="translate(110,140)">
    <polygon points="0,-62 54,-22 32,58 -32,58 -54,-22" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <polygon points="0,-62 54,-22 0,-2" fill="#C6A55A" fill-opacity="0.22"/>
    <polygon points="54,-22 32,58 0,-2" fill="#E8D9B5" fill-opacity="0.16"/>
    <polygon points="0,-2 32,58 -32,58" fill="#C6A55A" fill-opacity="0.30"/>
    <polygon points="-54,-22 0,-2 -32,58" fill="#E8D9B5" fill-opacity="0.20"/>
    <polygon points="0,-62 -54,-22 0,-2" fill="#C6A55A" fill-opacity="0.12"/>
    <line x1="0" y1="-62" x2="0" y2="-2" stroke="#FAF8F4" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="54" y1="-22" x2="0" y2="-2" stroke="#FAF8F4" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="-54" y1="-22" x2="0" y2="-2" stroke="#FAF8F4" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="32" y1="58" x2="0" y2="-2" stroke="#FAF8F4" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="-32" y1="58" x2="0" y2="-2" stroke="#FAF8F4" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- title -->
  <text x="240" y="118" font-family="Georgia, 'Playfair Display', serif" font-size="44" font-weight="700" fill="#FAF8F4" letter-spacing="0.5">
    Heather Benjamin Jewelry
  </text>
  <text x="240" y="155" font-family="Georgia, 'Playfair Display', serif" font-size="22" font-style="italic" fill="url(#goldGrad)">
    AI Order-to-Production Assistant
  </text>

  <!-- divider -->
  <line x1="240" y1="178" x2="900" y2="178" stroke="#7A7A7A" stroke-width="1" stroke-opacity="0.5"/>

  <!-- subtitle -->
  <text x="240" y="208" font-family="Inter, sans-serif" font-size="15" fill="#C9C9C9" letter-spacing="0.3">
    Purchase Order to Production, Packing &amp; Tracking, otomatis dengan AI
  </text>

  <!-- bottom tags -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#1E1E1E">
    <rect x="240" y="226" width="112" height="26" rx="13" fill="#C6A55A"/>
    <text x="296" y="243" text-anchor="middle" font-weight="600">Hackathon MVP</text>

    <rect x="362" y="226" width="84" height="26" rx="13" fill="#E8D9B5"/>
    <text x="404" y="243" text-anchor="middle" font-weight="600">Full-Stack</text>

    <rect x="456" y="226" width="86" height="26" rx="13" fill="none" stroke="#7A7A7A"/>
    <text x="499" y="243" text-anchor="middle" fill="#C9C9C9" font-weight="600">AI-Powered</text>
  </g>
</svg>
