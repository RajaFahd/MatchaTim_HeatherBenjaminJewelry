<svg viewBox="0 0 1100 1180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#262626"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C6A55A"/>
    </marker>
  </defs>
  <rect width="1100" height="1180" fill="url(#flowBg)"/>

  <text x="550" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#FAF8F4">Alur Kerja AI</text>
  <text x="550" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#7A7A7A">aiService.js · parserService.js · systemPrompt.js</text>

  <!-- Step 1: Upload -->
  <rect x="350" y="100" width="400" height="64" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <g transform="translate(378,118)">
    <path d="M14,0 L14,18 M7,7 L14,0 L21,7" fill="none" stroke="#E8D9B5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="2" y="22" width="24" height="6" rx="1.5" fill="none" stroke="#E8D9B5" stroke-width="2"/>
  </g>
  <text x="565" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">1 · Upload File PO</text>
  <text x="565" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#C9C9C9">PDF · Excel · Gambar (JPEG/PNG/WEBP)</text>

  <line x1="550" y1="164" x2="550" y2="196" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 2: parserService -->
  <rect x="280" y="200" width="540" height="70" rx="10" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
  <text x="550" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">2 · parserService</text>
  <text x="550" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#C9C9C9">Ekstrak teks (PDF/Excel) ATAU encode base64 (gambar)</text>

  <line x1="550" y1="270" x2="550" y2="302" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 3: systemPrompt -->
  <rect x="280" y="306" width="540" height="70" rx="10" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
  <text x="550" y="336" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">3 · systemPrompt.js</text>
  <text x="550" y="356" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#C9C9C9">Bangun system prompt + daftar katalog produk saat ini</text>

  <line x1="550" y1="376" x2="550" y2="408" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 4: aiService -->
  <rect x="280" y="412" width="540" height="70" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <text x="550" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">4 · aiService</text>
  <text x="550" y="462" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#C9C9C9">Kirim ke AI dengan structured JSON Schema</text>

  <!-- branch -->
  <line x1="550" y1="482" x2="550" y2="506" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="350" y1="506" x2="750" y2="506" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="350" y1="506" x2="350" y2="528" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="750" y1="506" x2="750" y2="528" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Gemini -->
  <rect x="200" y="532" width="300" height="84" rx="10" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
  <text x="350" y="564" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">Gemini 2.5 Flash</text>
  <text x="350" y="584" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#C9C9C9">Provider AI utama</text>
  <text x="350" y="602" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A7A7A">via Google AI Studio</text>

  <!-- OpenRouter -->
  <rect x="600" y="532" width="300" height="84" rx="10" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
  <text x="750" y="564" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">OpenRouter</text>
  <text x="750" y="584" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#C9C9C9">Fallback jika Gemini gagal/limit</text>
  <text x="750" y="602" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7A7A7A">model: google/gemini-2.5-flash</text>

  <!-- retry note -->
  <rect x="370" y="486" width="180" height="36" rx="8" fill="#1E1E1E" stroke="#7A7A7A" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="460" y="501" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.5" fill="#C9C9C9">Retry on HTTP 429</text>
  <text x="460" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.5" fill="#C9C9C9">backoff 5s → 10s</text>

  <!-- converge -->
  <line x1="350" y1="616" x2="350" y2="638" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="750" y1="616" x2="750" y2="638" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="350" y1="638" x2="750" y2="638" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="550" y1="638" x2="550" y2="664" stroke="#C6A55A" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 5: parse response -->
  <rect x="220" y="668" width="660" height="92" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <text x="550" y="694" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">5 · Parse Respons JSON</text>
  <text x="550" y="716" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#C9C9C9">po_number · customer · products[] · order_summary</text>
  <text x="550" y="734" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#C9C9C9">production_notes · packing_guide · missing_info · flags · validation</text>

  <line x1="550" y1="760" x2="550" y2="792" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 6: save to db -->
  <rect x="280" y="796" width="540" height="70" rx="10" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
  <text x="550" y="826" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">6 · Simpan ke Database</text>
  <text x="550" y="846" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#C9C9C9">orders · order_items · production · packing · tracking</text>

  <line x1="550" y1="866" x2="550" y2="898" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- branch production/packing -->
  <line x1="350" y1="918" x2="750" y2="918" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="550" y1="898" x2="550" y2="918" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="350" y1="918" x2="350" y2="940" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="750" y1="918" x2="750" y2="940" stroke="#7A7A7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="200" y="944" width="300" height="60" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <text x="350" y="970" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">Production Instruction</text>
  <text x="350" y="990" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">Catatan produksi &amp; artisan</text>

  <rect x="600" y="944" width="300" height="60" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <text x="750" y="970" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">Packing Guide</text>
  <text x="750" y="990" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">Checklist &amp; catatan packing</text>

  <line x1="350" y1="1004" x2="350" y2="1026" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="750" y1="1004" x2="750" y2="1026" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="350" y1="1026" x2="750" y2="1026" stroke="#7A7A7A" stroke-width="1.5"/>
  <line x1="550" y1="1026" x2="550" y2="1052" stroke="#C6A55A" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="350" y="1056" width="400" height="58" rx="10" fill="#2A2A2A" stroke="#C6A55A" stroke-width="1.5"/>
  <text x="550" y="1090" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FAF8F4">Tracking Dashboard</text>

  <!-- fallback note -->
  <rect x="60" y="1056" width="940" height="70" rx="10" fill="#241F14" stroke="#E8D9B5" stroke-width="1.2" stroke-dasharray="4,3" opacity="0"/>
  <text x="550" y="1150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#7A7A7A">Mode Fallback: jika kedua API key AI tidak tersedia atau gagal, sistem otomatis memakai data simulasi dari katalog produk</text>
</svg>
