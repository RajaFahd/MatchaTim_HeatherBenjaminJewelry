<svg viewBox="0 0 1180 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="erdBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#262626"/>
    </linearGradient>
  </defs>
  <rect width="1180" height="920" fill="url(#erdBg)"/>

  <text x="590" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#FAF8F4">Entity Relationship Diagram</text>
  <text x="590" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#7A7A7A">PostgreSQL (Supabase) · Prisma ORM · 7 Tabel</text>

  <!-- reusable key/fk icon defs -->
  <defs>
    <g id="pkIcon">
      <circle cx="4" cy="4" r="3.4" fill="none" stroke="#C6A55A" stroke-width="1.4"/>
      <line x1="6.4" y1="6.4" x2="11" y2="11" stroke="#C6A55A" stroke-width="1.4"/>
      <line x1="9" y1="9" x2="9" y2="11.5" stroke="#C6A55A" stroke-width="1.4"/>
    </g>
    <g id="fkIcon">
      <rect x="0" y="1" width="6" height="6" rx="1" fill="none" stroke="#7FA0A8" stroke-width="1.3"/>
      <rect x="7" y="1" width="6" height="6" rx="1" fill="none" stroke="#7FA0A8" stroke-width="1.3"/>
      <line x1="6" y1="4" x2="7" y2="4" stroke="#7FA0A8" stroke-width="1.3"/>
    </g>
  </defs>

  <!-- USERS table -->
  <g transform="translate(40,110)">
    <rect width="230" height="138" rx="8" fill="#2A2A2A" stroke="#7A7A7A" stroke-width="1.3"/>
    <rect width="230" height="30" rx="8" fill="#3A3A3A"/>
    <rect width="230" height="15" y="15" fill="#3A3A3A"/>
    <text x="115" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">users</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="218" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <text x="12" y="66">email</text><text x="218" y="66" text-anchor="end" fill="#7A7A7A">unique</text>
      <text x="12" y="84">password_hash</text>
      <text x="12" y="102">name · role</text>
      <text x="12" y="120">created_at</text>
    </g>
  </g>

  <!-- ORDERS table (central) -->
  <g transform="translate(475,110)">
    <rect width="240" height="208" rx="8" fill="#2A2A2A" stroke="#C6A55A" stroke-width="2"/>
    <rect width="240" height="30" rx="8" fill="#3A2F18"/>
    <rect width="240" height="15" y="15" fill="#3A2F18"/>
    <text x="120" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">orders</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="228" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <text x="12" y="66">po_number</text><text x="228" y="66" text-anchor="end" fill="#7A7A7A">unique</text>
      <text x="12" y="84">customer_name / email</text>
      <text x="12" y="102">upload_file</text>
      <text x="12" y="120">notes</text>
      <text x="12" y="138">status</text><text x="228" y="138" text-anchor="end" fill="#7A7A7A">default Uploaded</text>
      <text x="12" y="156">is_deleted · is_archived</text>
      <text x="12" y="174">created_at</text>
    </g>
  </g>

  <!-- PRODUCTS table -->
  <g transform="translate(910,110)">
    <rect width="230" height="158" rx="8" fill="#2A2A2A" stroke="#7A7A7A" stroke-width="1.3"/>
    <rect width="230" height="30" rx="8" fill="#3A3A3A"/>
    <rect width="230" height="15" y="15" fill="#3A3A3A"/>
    <text x="115" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">products</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="218" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <text x="12" y="66">style_code</text><text x="218" y="66" text-anchor="end" fill="#7A7A7A">unique</text>
      <text x="12" y="84">product_name</text>
      <text x="12" y="102">description · material</text>
      <text x="12" y="120">image_url</text>
      <text x="12" y="138">wholesale_price</text>
    </g>
  </g>

  <!-- ORDER_ITEMS table (bridge, below orders+products) -->
  <g transform="translate(690,400)">
    <rect width="250" height="188" rx="8" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
    <rect width="250" height="30" rx="8" fill="#3A341E"/>
    <rect width="250" height="15" y="15" fill="#3A341E"/>
    <text x="125" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">order_items</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="238" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <use href="#fkIcon" x="12" y="58"/><text x="28" y="66">order_id</text><text x="238" y="66" text-anchor="end" fill="#7A7A7A">FK · cascade</text>
      <use href="#fkIcon" x="12" y="76"/><text x="28" y="84">product_id</text><text x="238" y="84" text-anchor="end" fill="#7A7A7A">FK · set null</text>
      <text x="12" y="102">style_code · product_name</text>
      <text x="12" y="120">unit_price · quantity</text>
      <text x="12" y="138">size · material</text>
      <text x="12" y="156">special_request</text>
    </g>
  </g>

  <!-- PRODUCTION table -->
  <g transform="translate(40,400)">
    <rect width="240" height="148" rx="8" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
    <rect width="240" height="30" rx="8" fill="#3A341E"/>
    <rect width="240" height="15" y="15" fill="#3A341E"/>
    <text x="120" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">production</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="228" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <use href="#fkIcon" x="12" y="58"/><text x="28" y="66">order_id</text><text x="228" y="66" text-anchor="end" fill="#7A7A7A">FK · cascade</text>
      <text x="12" y="84">production_note</text>
      <text x="12" y="102">artisan_note</text>
      <text x="12" y="120">generated_by_ai · created_at</text>
    </g>
  </g>

  <!-- PACKING table -->
  <g transform="translate(320,640)">
    <rect width="240" height="148" rx="8" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
    <rect width="240" height="30" rx="8" fill="#3A341E"/>
    <rect width="240" height="15" y="15" fill="#3A341E"/>
    <text x="120" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">packing</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="228" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <use href="#fkIcon" x="12" y="58"/><text x="28" y="66">order_id</text><text x="228" y="66" text-anchor="end" fill="#7A7A7A">FK · cascade</text>
      <text x="12" y="84">packing_note</text>
      <text x="12" y="102">checklist</text><text x="228" y="102" text-anchor="end" fill="#7A7A7A">JSON</text>
      <text x="12" y="120">generated_by_ai · created_at</text>
    </g>
  </g>

  <!-- TRACKING table -->
  <g transform="translate(600,640)">
    <rect width="240" height="130" rx="8" fill="#2A2A2A" stroke="#E8D9B5" stroke-width="1.5"/>
    <rect width="240" height="30" rx="8" fill="#3A341E"/>
    <rect width="240" height="15" y="15" fill="#3A341E"/>
    <text x="120" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FAF8F4">tracking</text>
    <g font-family="Inter, sans-serif" font-size="10.5" fill="#C9C9C9">
      <use href="#pkIcon" x="12" y="40"/><text x="28" y="48">id</text><text x="228" y="48" text-anchor="end" fill="#7A7A7A">UUID PK</text>
      <use href="#fkIcon" x="12" y="58"/><text x="28" y="66">order_id</text><text x="228" y="66" text-anchor="end" fill="#7A7A7A">FK · cascade</text>
      <text x="12" y="84">status</text>
      <text x="12" y="102">updated_at</text>
    </g>
  </g>

  <!-- RELATIONSHIP LINES (orthogonal) with cardinality labels -->
  <g stroke="#C6A55A" stroke-width="1.6" fill="none">
    <!-- orders -> order_items (1..N) -->
    <path d="M 715 280 L 715 340 L 815 340 L 815 400"/>
    <!-- products -> order_items (1..N) -->
    <path d="M 1025 268 L 1025 360 L 940 360 L 940 400"/>
    <!-- orders -> production (1..N) -->
    <path d="M 475 200 L 280 200 L 280 400"/>
    <!-- orders -> packing (1..N) -->
    <path d="M 560 318 L 560 580 L 440 580 L 440 640"/>
    <!-- orders -> tracking (1..N) -->
    <path d="M 650 318 L 650 580 L 720 580 L 720 640"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="11" fill="#C6A55A" font-weight="700">
    <text x="722" y="335">1</text><text x="822" y="395">N</text>
    <text x="1018" y="355">1</text><text x="932" y="395">N</text>
    <text x="290" y="195">1</text><text x="290" y="395">N</text>
    <text x="565" y="575">1</text><text x="430" y="635">N</text>
    <text x="655" y="575">1</text><text x="730" y="635">N</text>
  </g>

  <!-- legend -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#7A7A7A">
    <use href="#pkIcon" x="40" y="850"/><text x="58" y="858">Primary Key</text>
    <use href="#fkIcon" x="170" y="850"/><text x="188" y="858">Foreign Key</text>
    <text x="310" y="858">1 — N : satu order memiliki banyak item / production / packing / tracking</text>
  </g>
  <text x="40" y="884" font-family="Inter, sans-serif" font-size="11" fill="#7A7A7A">Tabel tambahan (inventory, suppliers, invoices, dll.) belum dibuat di MVP ini agar prototipe tetap ringan.</text>
</svg>
